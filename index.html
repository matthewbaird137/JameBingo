<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Button Challenge</title>
    <style>
        :root {
            --primary: #4CAF50;
            --bg: #f0f2f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .setup-section, .game-section {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 16px; /* Prevents iOS zoom on focus */
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .btn-start {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .grid-btn {
            aspect-ratio: 1 / 1;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-weight: bold;
            font-size: 12px;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent; /* Mobile polish */
        }

        .grid-btn.clicked {
            background: var(--primary);
            color: white;
            border-color: #2E7D32;
            transform: scale(0.9);
        }

        .leaderboard {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .leaderboard h3 { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .score-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #fafafa; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="setup" class="setup-section">
        <h2>Enter Your Name</h2>
        <input type="text" id="playerName" placeholder="Your name..." autocomplete="off">
        <br>
        <button class="btn-start" onclick="startGame()">Start Game</button>
    </div>

    <div id="game" class="game-section hidden">
        <h2 id="welcomeMsg"></h2>
        <p>Buttons pressed: <span id="countDisplay">0</span> / 4</p>
        <div id="grid-container"></div>
    </div>

    <div class="leaderboard">
        <h3>Leaderboard (Local)</h3>
        <div id="scoreList"></div>
    </div>

    <script>
        const words = ["Apple", "Cloud", "Neon", "Pulse", "Zen", "Flow", "Bolt", "Echo", "Mars", "Orbit", "Glitch", "Swift", "Nova", "Flux", "Wave", "Data"];
        let activeButtons = 0;
        let currentPlayer = "";

        // Load leaderboard on startup
        window.onload = updateLeaderboardDisplay;

        function startGame() {
            const nameInput = document.getElementById('playerName').value;
            if (nameInput.trim() === "") return alert("Please enter a name!");
            
            currentPlayer = nameInput;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = `Good luck, ${currentPlayer}!`;
            
            createGrid();
        }

        function createGrid() {
            const container = document.getElementById('grid-container');
            const shuffled = [...words].sort(() => Math.random() - 0.5);

            for (let i = 0; i < 16; i++) {
                const btn = document.createElement('button');
                btn.className = 'grid-btn';
                btn.innerText = shuffled[i];
                
                btn.onclick = function() {
                    this.classList.toggle('clicked');
                    
                    // Recalculate count
                    activeButtons = document.querySelectorAll('.clicked').length;
                    document.getElementById('countDisplay').innerText = activeButtons;

                    if (activeButtons === 4) {
                        saveScore(currentPlayer, 4);
                        setTimeout(() => {
                            alert(`Winner! Great job ${currentPlayer}!`);
                        }, 100);
                    }
                };
                container.appendChild(btn);
            }
        }

        function saveScore(name, score) {
            let scores = JSON.parse(localStorage.getItem('gameScores')) || [];
            
            // Add new score
            scores.push({ name: name, score: score, date: new Date().toLocaleDateString() });
            
            // Keep only top 5
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 5);

            localStorage.setItem('gameScores', JSON.stringify(scores));
            updateLeaderboardDisplay();
        }

        function updateLeaderboardDisplay() {
            const list = document.getElementById('scoreList');
            const scores = JSON.parse(localStorage.getItem('gameScores')) || [];
            
            if (scores.length === 0) {
                list.innerHTML = "<p>No scores yet!</p>";
                return;
            }

            list.innerHTML = scores.map(s => `
                <div class="score-row">
                    <span><strong>${s.name}</strong></span>
                    <span>${s.score} Buttons</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
