<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Button Challenge</title>
    <style>
        :root {
            --primary: #4CAF50;
            --bg: #f0f2f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .setup-section, .game-section {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 16px; /* Prevents iOS zoom on focus */
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .btn-start {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .grid-btn {
            aspect-ratio: 1 / 1;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-weight: bold;
            font-size: 12px;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent; /* Mobile polish */
        }

        .grid-btn.clicked {
            background: var(--primary);
            color: white;
            border-color: #2E7D32;
            transform: scale(0.9);
        }

        .leaderboard {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .leaderboard h3 { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .score-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #fafafa; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="setup" class="setup-section">
        <h2>Enter Your Name</h2>
        <input type="text" id="playerName" placeholder="Your name..." autocomplete="off">
        <br>
        <button class="btn-start" onclick="startGame()">Start Game</button>
    </div>

    <div id="game" class="game-section hidden">
        <h2 id="welcomeMsg"></h2>
        <div id="grid-container"></div>
    </div>

    <div class="leaderboard">
        <h3>Leaderboard (Local)</h3>
        <div id="scoreList"></div>
    </div>

    <script>
    // 1. Setup variables at the very top
    const words = ["jeme crashout", "jack voice crack", "ethan mogging","gay pda", "ragebait", "mia ragebaited", "mia complains about handcuffs", "mia impression of jeme", "glaze henryk", "mahjong", "niche music reference", "lesbian pda", "straight ppl pda", "racism", "katie talks abt middle age men", "jeme complains abt jeme bingo", "bad joke", "katie left rubbish", "jeme says something obstanant", "proof", "podge story", "67","Loud Munching", "Says Ref", "Only Child", "Says Surely Thats A Red", "BasketBall Comment", "Goons abt Matthew Chen", "Neeky Pokimon Comment", "Physics being hard complaint", 
            "quentin glaze", "silent gooning", "DoomScroll", "Rushing HW", "Silent Treatment", "Laughs At Own Joke", "Speed face", "Comment abt holiday/ living together", "'PE is Real subject'", "BasketBall Glaze" , "Doing HW preformatively", "Asks abt something that was just said", "Runs a joke dry", "absolute...", "uses applewatch"        
             ];

    let currentPlayer = "";
    let hasWon = false;

    // Run this when the page first loads
    window.onload = function() {
        updateLeaderboardDisplay();
    };

    function startGame() {
        const nameInput = document.getElementById('playerName').value;
        if (!nameInput || nameInput.trim() === "") {
            alert("Please enter a name first!");
            return;
        }
        
        currentPlayer = nameInput.trim();
        hasWon = false; // Reset win state for new game
        
        // Add player to the leaderboard immediately with 0
        saveOrUpdateScore(currentPlayer, 0);

        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        document.getElementById('welcomeMsg').innerText = "Player: " + currentPlayer;
        
        createGrid();
    }

    function createGrid() {
        const container = document.getElementById('grid-container');
        container.innerHTML = ""; // Clear any old buttons
        
        // Shuffle the words
        const shuffled = [...words].sort(() => Math.random() - 0.5);

        for (let i = 0; i < 16; i++) {
            const btn = document.createElement('button');
            btn.className = 'grid-btn';
            btn.innerText = shuffled[i];
            
            btn.onclick = function() {
                // 1. Toggle the visual "clicked" state
                this.classList.toggle('clicked');
                
                // 2. Count EXACTLY how many buttons are currently green
                const allClicked = document.querySelectorAll('.clicked');
                const currentCount = allClicked.length;
                
                // 3. Update the number on the screen
                document.getElementById('countDisplay').innerText = currentCount;

                // 4. Update the leaderboard data
                saveOrUpdateScore(currentPlayer, currentCount);

                // 5. Check for Win
                if (currentCount === 4 && !hasWon) {
                    hasWon = true;
                    setTimeout(() => alert("Victory! 4 buttons selected."), 100);
                }
            };
            container.appendChild(btn);
        }
    }

    function saveOrUpdateScore(name, score) {
        // Grab existing scores from LocalStorage
        let data = localStorage.getItem('gameScores');
        let scores = data ? JSON.parse(data) : [];
        
        // Find if this player is already in the list
        let found = false;
        for (let i = 0; i < scores.length; i++) {
            if (scores[i].name.toLowerCase() === name.toLowerCase()) {
                scores[i].score = score; // Update their score
                found = true;
                break;
            }
        }

        // If not found, add them as a new entry
        if (!found) {
            scores.push({ name: name, score: score });
        }

        // Sort: Highest score at the top
        scores.sort((a, b) => b.score - a.score);

        // Save back to LocalStorage
        localStorage.setItem('gameScores', JSON.stringify(scores));
        
        // Refresh the visual leaderboard
        updateLeaderboardDisplay();
    }

    function updateLeaderboardDisplay() {
        const list = document.getElementById('scoreList');
        if (!list) return;

        let data = localStorage.getItem('gameScores');
        let scores = data ? JSON.parse(data) : [];
        
        if (scores.length === 0) {
            list.innerHTML = "<p style='color:gray'>No scores yet.</p>";
            return;
        }

        // Generate the HTML rows
        let html = "";
        scores.forEach((item, index) => {
            let isMe = (item.name === currentPlayer);
            html += `
                <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee; 
                     background: ${isMe ? '#d1e7dd' : 'white'}; font-weight: ${isMe ? 'bold' : 'normal'}">
                    <span>#${index + 1} ${item.name}</span>
                    <span>${item.score} / 4</span>
                </div>
            `;
        });
        list.innerHTML = html;
    }
</script>
</body>
</html>
